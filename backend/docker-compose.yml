version: "3.9"

services:
  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api_storage:/app/storage

volumes:
  api_storage:
