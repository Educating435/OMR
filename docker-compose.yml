version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: omr_scanner
      POSTGRES_USER: omr
      POSTGRES_PASSWORD: omr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://omr:omr@postgres:5432/omr_scanner
      JWT_SECRET_KEY: change-me
      JWT_REFRESH_SECRET_KEY: change-me-too
      STORAGE_ROOT: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - postgres

  admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:

